<svg xmlns="http://www.w3.org/2000/svg" width="980" height="220" viewBox="0 0 980 220" role="img" aria-labelledby="title desc">
  <title id="title">شعار سكيلد هوست - النسخة الداكنة</title>
  <desc id="desc">شعار عربي داكن لعلامة سكيلد هوست مع أيقونة الاستضافة</desc>
  <defs>
    <style>
      .word-main{font-family:'Tajawal','Cairo','IBM Plex Sans Arabic','Arial',sans-serif;font-weight:900;font-size:82px;dominant-baseline:middle;}
      .white{fill:#ffffff;}
      .navy{fill:#071a3d;}
      .navy-soft{fill:#132a47;}
      .orange{fill:#ff6b00;}
      .teal{fill:#12a39a;}
      .blue{fill:#1478ff;}
      .cream{fill:#07111f;}
    </style>
  </defs>

  <!-- Icon on the right for RTL logo lockup -->
  <g transform="translate(800 40)">
    <rect x="0" y="0" width="140" height="140" rx="34" class="navy-soft"/>
    <rect x="31" y="31" width="78" height="78" rx="18" class="cream"/>
    <rect x="51" y="51" width="60" height="10" rx="5" class="orange"/>
    <rect x="39" y="71" width="72" height="10" rx="5" class="white" opacity="0.92"/>
    <circle cx="111" cy="76" r="8" class="blue"/>
    <rect x="51" y="92" width="60" height="10" rx="5" class="teal"/>
  </g>

  <!-- Arabic wordmark -->
  <g direction="rtl" unicode-bidi="bidi-override">
    <text x="760" y="112" text-anchor="end" class="word-main white">سكيلد</text>
    <text x="430" y="112" text-anchor="end" class="word-main orange">هوست</text>
  </g>
</svg>
