<svg xmlns="http://www.w3.org/2000/svg" width="460" height="96" viewBox="0 0 460 96" role="img" aria-label="سكيلد هوست">
  <defs>
    <style>
      .word {
        font-family: Tahoma, Arial, sans-serif;
        font-weight: 900;
        font-size: 44px;
        dominant-baseline: middle;
      }

      .white { fill: #ffffff; }
      .orange { fill: #ff6b00; }
      .teal { fill: #12a39a; }
      .blue { fill: #1478ff; }
      .cream { fill: #fff6ea; }
      .navy { fill: #071a3d; }
    </style>
  </defs>

  <!-- Arabic text: visual order left to right = هوست | سكيلد | icon -->
  <text x="155" y="52" text-anchor="end" class="word orange">هوست</text>
  <text x="320" y="52" text-anchor="end" class="word white">سكيلد</text>

  <!-- Icon on right -->
  <g transform="translate(360 12)">
    <rect x="0" y="0" width="72" height="72" rx="19" class="navy"></rect>
    <rect x="16" y="16" width="40" height="40" rx="11" class="cream"></rect>
    <rect x="25" y="25" width="32" height="6" rx="3" class="orange"></rect>
    <rect x="20" y="36" width="37" height="6" rx="3" class="navy"></rect>
    <circle cx="57" cy="39" r="5" class="blue"></circle>
    <rect x="25" y="48" width="32" height="6" rx="3" class="teal"></rect>
  </g>
</svg>